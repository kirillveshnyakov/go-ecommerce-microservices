name: CI

on:
  workflow_dispatch:
    inputs:
      run_unit:
        description: "Run unit tests"
        required: true
        default: true
        type: boolean
      run_integration:
        description: "Run integration tests"
        required: true
        default: true
        type: boolean
      run_lint:
        description: "Run linter"
        required: true
        default: true
        type: boolean
      run_coverage:
        description: "Print test coverage"
        required: true
        default: true
        type: boolean

permissions:
  contents: read

env:
  GO_VERSION: "1.26.2"

jobs:
  ci:
    name: Manual checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            go.work.sum
            cart/go.sum
            loms/go.sum
            notifications/go.sum
            pkg/go.sum
            integration-tests/go.sum

      - name: Install Task
        run: |
          go install github.com/go-task/task/v3/cmd/task@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Generate code
        run: task generate

      - name: Check generated tracked files
        run: git diff --exit-code

      - name: Lint
        if: ${{ inputs.run_lint }}
        run: task lint

      - name: Unit tests
        if: ${{ inputs.run_unit }}
        run: |
          (cd cart && go test -v -count=1 ./...)
          (cd loms && go test -v -count=1 ./...)
          (cd notifications && go test -v -count=1 ./...)

      - name: Coverage
        if: ${{ inputs.run_coverage }}
        run: |
          mkdir -p coverage

          printf "| Service | Coverage |\n| --- | ---: |\n" | tee coverage/summary.md

          for service in loms cart notifications; do
            echo "Checking coverage for ${service}..."

            if ! (cd "$service" && go test ./... -count=1 -covermode=atomic -coverprofile="../coverage/${service}.out") > "coverage/${service}.test.log"; then
              cat "coverage/${service}.test.log"
              exit 1
            fi

            coverage_value="$(go tool cover -func="coverage/${service}.out" | awk '/^total:/ { print $3 }')"
            printf "| %s | %s |\n" "$service" "$coverage_value" | tee -a coverage/summary.md
          done

          {
            echo "### Test coverage"
            echo
            cat coverage/summary.md
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Validate Docker Compose config
        if: ${{ inputs.run_integration }}
        run: |
          docker compose \
            -f docker-compose.ci.yml \
            -f docker-compose.test.yml \
            config --quiet

      - name: Integration tests
        if: ${{ inputs.run_integration }}
        run: |
          docker compose \
            -f docker-compose.ci.yml \
            -f docker-compose.test.yml \
            down -v --remove-orphans || true

          docker compose \
            -f docker-compose.ci.yml \
            -f docker-compose.test.yml \
            up \
            --build \
            --abort-on-container-exit \
            --exit-code-from integration-tests

      - name: Cleanup
        if: ${{ always() && inputs.run_integration }}
        run: |
          docker compose \
            -f docker-compose.ci.yml \
            -f docker-compose.test.yml \
            down -v --remove-orphans || true
