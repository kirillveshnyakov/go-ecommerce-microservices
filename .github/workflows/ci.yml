name: CI

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  GO_VERSION: "1.26.2"

jobs:
  ci:
    name: Generate, Lint, Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            go.work.sum
            cart/go.sum
            loms/go.sum
            notifications/go.sum
            pkg/go.sum
            integration-tests/go.sum

      - name: Install Task
        run: |
          go install github.com/go-task/task/v3/cmd/task@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Generate code
        run: task generate

      - name: Check generated tracked files
        run: git diff --exit-code

      - name: Lint
        run: task lint

      - name: Unit tests
        run: |
          (cd cart && go test ./...)
          (cd loms && go test ./...)
          (cd notifications && go test ./...)
          (cd pkg && go test ./...)

      - name: Validate Docker Compose config
        run: |
          docker compose \
            -f docker-compose.ci.yml \
            -f docker-compose.test.yml \
            config --quiet

      - name: Integration tests
        run: |
          docker compose \
            -f docker-compose.ci.yml \
            -f docker-compose.test.yml \
            down -v --remove-orphans || true

          docker compose \
            -f docker-compose.ci.yml \
            -f docker-compose.test.yml \
            up \
            --build \
            --abort-on-container-exit \
            --exit-code-from integration-tests

      - name: Cleanup
        if: always()
        run: |
          docker compose \
            -f docker-compose.ci.yml \
            -f docker-compose.test.yml \
            down -v --remove-orphans || true
