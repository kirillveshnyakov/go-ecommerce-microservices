name: CI

on:
  workflow_dispatch:
    inputs:
      run_unit:
        description: "Run unit tests"
        required: true
        default: true
        type: boolean
      run_integration:
        description: "Run integration tests"
        required: true
        default: true
        type: boolean
      run_lint:
        description: "Run linter"
        required: true
        default: true
        type: boolean
      run_coverage:
        description: "Print test coverage"
        required: true
        default: true
        type: boolean

permissions:
  contents: read

env:
  GO_VERSION: "1.26.2"

jobs:
  ci:
    name: Manual checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            go.work.sum
            cart/go.sum
            loms/go.sum
            notifications/go.sum
            pkg/go.sum
            integration-tests/go.sum

      - name: Install Task
        run: |
          go install github.com/go-task/task/v3/cmd/task@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Generate code
        run: task generate

      - name: Check generated tracked files
        run: git diff --exit-code

      - name: Lint
        if: ${{ inputs.run_lint }}
        run: task lint

      - name: Unit tests
        if: ${{ inputs.run_unit }}
        run: |
          (cd cart && go test ./...)
          (cd loms && go test ./...)
          (cd notifications && go test ./...)

      - name: Coverage
        if: ${{ inputs.run_coverage }}
        run: |
          mkdir -p coverage
          for mod in cart loms notifications pkg; do
            (
              cd "$mod"
              go test ./... -covermode=atomic -coverprofile="../coverage/${mod}.out"
            )
          done

          echo "mode: atomic" > coverage/combined.out
          tail -q -n +2 coverage/cart.out coverage/loms.out coverage/notifications.out coverage/pkg.out >> coverage/combined.out

          echo "Coverage summary:"
          go tool cover -func=coverage/combined.out | tee coverage/summary.txt
          echo
          echo "Total coverage:"
          grep '^total:' coverage/summary.txt

      - name: Validate Docker Compose config
        if: ${{ inputs.run_integration }}
        run: |
          docker compose \
            -f docker-compose.ci.yml \
            -f docker-compose.test.yml \
            config --quiet

      - name: Integration tests
        if: ${{ inputs.run_integration }}
        run: |
          docker compose \
            -f docker-compose.ci.yml \
            -f docker-compose.test.yml \
            down -v --remove-orphans || true

          docker compose \
            -f docker-compose.ci.yml \
            -f docker-compose.test.yml \
            up \
            --build \
            --abort-on-container-exit \
            --exit-code-from integration-tests

      - name: Cleanup
        if: ${{ always() && inputs.run_integration }}
        run: |
          docker compose \
            -f docker-compose.ci.yml \
            -f docker-compose.test.yml \
            down -v --remove-orphans || true
