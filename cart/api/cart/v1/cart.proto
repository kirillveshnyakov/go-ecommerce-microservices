syntax = "proto3";

package github.com.igoroutine_courses.microservices.ecommerce.cart.v1;

option go_package = "github.com/igoroutine-courses/microservices.ecommerce.pkg/generated/cart/api/cart/v1;cart";

import "google/protobuf/empty.proto";
import "google/protobuf/descriptor.proto";
import "google/api/annotations.proto";
import "validate/validate.proto";


service Cart {
  rpc AddItem(AddItemRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/v1/cart/item/add"
      body: "*"
    };
  }

  rpc DeleteItem(DeleteItemRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/v1/cart/item/delete"
      body: "*"
    };
  }

  rpc ListCart(ListCartRequest) returns (stream ListCartResponse) {
    option (google.api.http) = {
      post: "/v1/cart/list"
      body: "*"
    };
  }

  rpc ClearCart(ClearCartRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/v1/cart/clear"
      body: "*"
    };
  }

  rpc CheckoutCart(CheckoutCartRequest) returns (CheckoutCartResponse) {
    option (google.api.http) = {
      post: "/v1/cart/checkout"
      body: "*"
    };
  }
}

message Item {
  uint32 sku = 1;
  uint32 count = 2;
  string name = 3;
  uint32 price = 4;
}

message AddItemRequest{
  int64 user_id = 1 [(validate.rules).int64.gte = 0];
  uint32 sku = 2 [(validate.rules).uint32.gte = 0];
  uint32 count = 3 [(validate.rules).uint32.gt = 0];
}

message DeleteItemRequest{
  int64 user_id = 1 [(validate.rules).int64.gte = 0];
  uint32 sku = 2 [(validate.rules).uint32.gte = 0];
}

message ListCartRequest{
  int64 user_id = 1 [(validate.rules).int64.gte = 0];
}
message ListCartResponse{
  repeated Item items = 1;
  uint32 total_price = 2;
}

message ClearCartRequest{
  int64 user_id = 1 [(validate.rules).int64.gte = 0];
}
message CheckoutCartRequest{
  int64 user_id = 1 [(validate.rules).int64.gte = 0];
}
message CheckoutCartResponse{
  int64 order_id = 1;
}
