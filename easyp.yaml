lint:
    use:
        - DEFAULT
    enum_zero_value_suffix: _UNSPECIFIED
    service_suffix: Service
    ignore:
        - github.com

deps:
  - github.com/googleapis/googleapis
  - github.com/bufbuild/protoc-gen-validate
generate:
    inputs:
      - directory: "./cart/api"
      - directory: "./loms/api"
      - directory: "./notifications/api"
    plugins:
        - name: go
          out: ./pkg/generated
          opts:
              paths: source_relative
        - name: go-grpc
          out: ./pkg/generated
          opts:
              paths: source_relative
              require_unimplemented_servers: false
        - name: grpc-gateway
          out: ./pkg/generated
          opts:
              paths: source_relative
        - name: openapiv2
          out: ./docs/spec
          opts:
              generate_unbound_methods: true
        - name: protoc-gen-validate
          out: ./pkg/generated
          opts:
              paths: source_relative
              lang: go

breaking:
    use:
        - DIRECTORY_SAME_PACKAGE
        - PACKAGE_DEFINED
        - FIELD_LOWER_SNAKE_CASE
        - MESSAGE_PASCAL_CASE
